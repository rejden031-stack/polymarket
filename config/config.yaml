arbitrage:
  enabled: true
  min_profit_pct: 0.3
  max_slippage_pct: 0.1
  max_position_size_pct: 2.0

market_making:
  enabled: true
  min_volume_24h: 50_000
  max_spread: 0.03
  tick_offset: 1
  max_inventory_pct: 0.5
  stop_loss_spread_mult: 2.0
  post_only: true

risk:
  daily_loss_limit_pct: 0.5
  portfolio_drawdown_limit_pct: 3.0
  max_daily_trades: 20
  kill_switch_file: "./STOP"

scan:
  interval_seconds: 300
  min_market_volume: 10_000
  min_market_liquidity: 5_000
  top_n_markets: 20

logging:
  level: INFO
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  file: "./data/bot.log"
